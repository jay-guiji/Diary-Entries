<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>记账APP</title>

    <!-- PWA 核心 -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#005DA7" />

    <!-- iOS PWA 适配 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="记账" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- 常规图标 -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <!-- iOS 启动画面（白色背景 + 图标居中） -->
    <meta name="apple-mobile-web-app-title" content="记账">
    <style>
      /* 防止 iOS 添加到主屏幕时出现白屏闪烁 */
      html, body { 
        margin: 0; padding: 0; 
        background: #F7FAFC; 
        -webkit-tap-highlight-color: transparent;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      /* 首屏骨架屏 — JS 加载前立即显示，避免白屏 */
      #app-skeleton {
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-width: 448px;
        margin: 0 auto;
        background: #F7FAFC;
        overflow: hidden;
      }
      #app-skeleton .sk-header {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem 1.5rem;
        padding-top: max(1rem, env(safe-area-inset-top));
        background: #FAFAFA;
        border-bottom: 1px solid #F5F5F5;
      }
      #app-skeleton .sk-title {
        font-size: 1.25rem;
        font-weight: 700;
        color: #005DA7;
      }
      #app-skeleton .sk-body {
        flex: 1;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .sk-block {
        background: linear-gradient(90deg, #E2E8F0 25%, #EDF2F7 50%, #E2E8F0 75%);
        background-size: 200% 100%;
        animation: sk-shimmer 1.5s infinite;
        border-radius: 1rem;
      }
      @keyframes sk-shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      /* React 加载完成后隐藏骨架屏 */
      #root:not(:empty) + #app-skeleton { display: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- 首屏骨架屏：在 React 渲染完成前显示，消除白屏 -->
    <div id="app-skeleton">
      <div class="sk-header">
        <span class="sk-title">记账本</span>
      </div>
      <div class="sk-body">
        <div class="sk-block" style="height:2rem;width:8rem"></div>
        <div class="sk-block" style="height:10rem"></div>
        <div style="display:flex;gap:0.75rem">
          <div class="sk-block" style="height:6rem;flex:1"></div>
          <div class="sk-block" style="height:6rem;flex:1"></div>
        </div>
        <div class="sk-block" style="height:3rem"></div>
        <div class="sk-block" style="height:3rem"></div>
        <div class="sk-block" style="height:3rem"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- 【BUILD MARKER v6】启动即卸载所有 SW + 打点 -->
    <script>
      console.log('%c[BUILD v6 @ ' + new Date().toISOString() + '] HTML loaded', 'color:green;font-weight:bold');
      // 🔥 立刻主动卸载所有 Service Worker（在 React 加载前执行），防止旧 SW 拦截主 JS
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          console.log('[BUILD v6] existing SW count:', regs.length);
          if (regs.length > 0) {
            console.warn('[BUILD v6] unregistering all old SW...');
            Promise.all(regs.map(r => r.unregister())).then(() => {
              // 清空所有 cache 后刷新一次
              if (window.caches && caches.keys) {
                caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k))))
                  .then(() => {
                    console.warn('[BUILD v6] caches cleared, reloading...');
                    // 只刷一次，避免死循环
                    if (!sessionStorage.getItem('sw_cleared')) {
                      sessionStorage.setItem('sw_cleared', '1');
                      location.reload();
                    }
                  });
              }
            });
          }
        });
      }
      // 10 秒后检查 React 是否渲染
      setTimeout(() => {
        var root = document.getElementById('root');
        if (!root || !root.children.length) {
          console.error('[BUILD v6] React 10s内未渲染！root子元素数=', root ? root.children.length : 'null');
          document.title = '⚠ React未渲染';
        } else {
          console.log('[BUILD v6] React 已渲染，root 子元素数:', root.children.length);
        }
      }, 10000);
    </script>

    <!-- 注册 Service Worker（v6：先不注册新 SW，确认页面正常后再恢复） -->
    <script>
      // 暂时禁用 SW 注册以排查问题
      console.log('[BUILD v6] SW registration DISABLED for debugging');
    </script>
  </body>
</html>
