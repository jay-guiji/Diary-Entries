<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4"/>
      <stop offset="100%" style="stop-color:#005DA7"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- 钱币外圈 -->
  <circle cx="256" cy="246" r="150" fill="none" stroke="white" stroke-width="16" opacity="0.9"/>
  <!-- ¥ 符号 -->
  <text x="256" y="280" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="180" fill="white">¥</text>
  <!-- 底部文字 -->
  <text x="256" y="460" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="48" fill="white" opacity="0.9">记账</text>
</svg>
